[profile.default]
src = "src"
out = "out"
libs = ["dependencies"]

[fmt]
sort_imports = true
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "all"
quote_style = "double"
tab_width = 4

[lint]
exclude_lints = [
    "mixed-case-variable",
    "screaming-snake-case-immutable",
    "mixed-case-function",
]

[dependencies]
forge-std = "1.16.2"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
